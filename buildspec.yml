version: 0.2
phases:
  build:
    commands:
      - echo "CODEBUILD_WEBHOOK_BASE_REF=$CODEBUILD_WEBHOOK_BASE_REF"
      - echo "CODEBUILD_WEBHOOK_HEAD_REF=$CODEBUILD_WEBHOOK_HEAD_REF"
      - echo "CODEBUILD_WEBHOOK_TRIGGER=$CODEBUILD_WEBHOOK_TRIGGER"
      - echo "CODEBUILD_WEBHOOK_EVENT=$CODEBUILD_WEBHOOK_EVENT"
      - echo "=== Primary Source ==="
      - echo "CODEBUILD_SOURCE_VERSION=$CODEBUILD_SOURCE_VERSION"
      - echo "Primary branch:"
      - cd $CODEBUILD_SRC_DIR && git branch
      - echo "=== Secondary Source (before checkout) ==="
      - echo "CODEBUILD_SOURCE_VERSION_SECONDARY_SRC=$CODEBUILD_SOURCE_VERSION_SECONDARY_SRC"
      - echo "Secondary branch before:"
      - cd $CODEBUILD_SRC_DIR_SECONDARY_SRC && git branch
      - echo "=== Workaround - checkout webhook branch on secondary source ==="
      - cd $CODEBUILD_SRC_DIR_SECONDARY_SRC && git fetch origin $CODEBUILD_WEBHOOK_HEAD_REF && git checkout $CODEBUILD_WEBHOOK_HEAD_REF
      - echo "Secondary branch after:"
      - cd $CODEBUILD_SRC_DIR_SECONDARY_SRC && git branch
      - echo "=== Verify - check for feature-test-marker.txt ==="
      - ls $CODEBUILD_SRC_DIR_SECONDARY_SRC/feature-test-marker.txt && echo "SUCCESS - feature-test branch checked out" || echo "FAIL - still on main"
