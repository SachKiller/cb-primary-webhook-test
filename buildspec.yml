version: 0.2
phases:
  build:
    commands:
      - echo "=== Webhook Variables ==="
      - echo "CODEBUILD_WEBHOOK_BASE_REF=$CODEBUILD_WEBHOOK_BASE_REF"
      - echo "CODEBUILD_WEBHOOK_HEAD_REF=$CODEBUILD_WEBHOOK_HEAD_REF"
      - echo "CODEBUILD_WEBHOOK_TRIGGER=$CODEBUILD_WEBHOOK_TRIGGER"
      - echo "CODEBUILD_WEBHOOK_EVENT=$CODEBUILD_WEBHOOK_EVENT"
      - echo "=== Primary Source ==="
      - echo "CODEBUILD_SOURCE_VERSION=$CODEBUILD_SOURCE_VERSION"
      - echo "Primary branch:"
      - cd $CODEBUILD_SRC_DIR && git branch
      - echo "=== Secondary Source ==="
      - echo "CODEBUILD_SOURCE_VERSION_SECONDARY_SRC=$CODEBUILD_SOURCE_VERSION_SECONDARY_SRC"
      - echo "Secondary branch:"
      - cd $CODEBUILD_SRC_DIR_SECONDARY_SRC && git branch
